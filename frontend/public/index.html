<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HabitaPlot™ - Your trusted platform for buying, selling, and renting properties">
    <meta name="theme-color" content="#2563eb">
    
    <title>HabitaPlot™ - Real Estate Marketplace</title>
    
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Meta Tags -->
    <meta property="og:title" content="HabitaPlot™ - Real Estate Marketplace">
    <meta property="og:description" content="Find your perfect property - Buy, sell, or rent real estate">
    <meta property="og:image" content="https://habitaplot.com/og-image.png">
    <meta property="og:url" content="https://habitaplot.com">
    
    <!-- Google Analytics (Optional) -->
    <!-- <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script> -->
</head>
<body class="bg-gray-50 font-sans">
    <noscript>
        <div style="text-align: center; padding: 20px; font-size: 16px; color: #666;">
            <p>This application requires JavaScript to be enabled.</p>
            <p>Please enable JavaScript in your browser settings.</p>
        </div>
    </noscript>
    
    <div id="root"></div>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configure Tailwind CSS
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#1e40af'
                    }
                }
            }
        }
    </script>

    <!-- PWA Service Worker Registration -->
    <script>
        // Register Service Worker for offline support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker
                    .register('/service-worker.js', { scope: '/' })
                    .then((registration) => {
                        console.log('[PWA] Service Worker registered:', registration.scope);
                        
                        // Check for updates periodically
                        setInterval(() => {
                            registration.update();
                        }, 60000);
                    })
                    .catch((error) => {
                        console.error('[PWA] Service Worker registration failed:', error);
                    });
            });

            // Handle sync completion messages
            navigator.serviceWorker.addEventListener('message', (event) => {
                if (event.data.type === 'SYNC_COMPLETE') {
                    console.log('[PWA] Sync complete:', event.data.success);
                    window.dispatchEvent(new CustomEvent('pwa-sync-complete', { detail: event.data }));
                }
            });
        } else {
            console.log('[PWA] Service Workers not supported in this browser');
        }

        // Check if app is running as PWA
        window.isPWA = () => {
            return window.matchMedia('(display-mode: standalone)').matches ||
                   navigator.standalone ||
                   window.navigator.standalone === true;
        };
    </script>
</body>
</html>
